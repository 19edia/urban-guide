<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reino MMORPG - Inicie sua Jornada</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #1a1a2e, #16213e, #0f3460);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: rgba(0, 0, 0, 0.7);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(78, 204, 163, 0.3);
            max-width: 600px;
        }
        h1 { font-size: 3rem; margin-bottom: 1rem; color: #4ecca3; text-shadow: 2px 2px 4px #000; }
        p { font-size: 1.2rem; line-height: 1.6; color: #dcdde1; margin-bottom: 2.5rem; }
        .btn {
            display: inline-block;
            background-color: #0088cc;
            color: white;
            padding: 18px 40px;
            font-size: 1.3rem;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 136, 204, 0.4);
        }
        .btn:hover { background-color: #00aaff; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0, 136, 204, 0.6); }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ Reino MMORPG</h1>
        <p>A maior aventura de texto espera por você. Crie seu herói, enfrente monstros lendários e conquiste tesouros épicos diretamente no seu Telegram.</p>
        <!-- Substitua 'MEU_BOT_NAME_BOT' pelo username real do seu bot -->
        <a href="https://t.me/FalentisMmobot" target="_blank" class="btn">🚀 Começar Aventura no Telegram</a>
    </div>
</body>
</html>
